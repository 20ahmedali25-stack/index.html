<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">

<meta name="description" content="البطاقات التعليمية من منصة الحلحلي — أداة مراجعة ذكية بتقنية التكرار المتباعد، تحوّل الحفظ من عبء إلى متعة.">
<meta name="keywords" content="بطاقات تعليمية, فلاش كارد, مراجعة, الحلحلي, قطر, تعليم">

<style>
/* ═══════════════════════════════════════════
   الثوابت (نفس هوية الحلحلي)
   ═══════════════════════════════════════════ */
:root{
  --navy:#1a4d3a;
  --navy-dark:#0f3028;
  --navy-darker:#0a2820;
  --navy-light:#2d6e54;
  --gold:#c9a227;
  --gold-soft:#e8c968;
  --gold-dark:#a68820;
  --maroon:#8D1B3D;
  --cream:#fbf9f2;
  --paper:#faf2d6;
  --text:#2c3e50;
  --text-soft:#6b7c8e;
  --border:#dbe8df;
  --success:#1a7a4a;
  --danger:#c0392b;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{overscroll-behavior:none;}
body{
  font-family:"Tajawal","Cairo",sans-serif;
  background:var(--cream);
  color:var(--text);
  min-height:100vh;
  -webkit-user-select:none;user-select:none;
}

/* ═══════════════════════════════════════════
   شريط علوي
   ═══════════════════════════════════════════ */
.top-bar{
  position:fixed;top:0;left:0;right:0;
  background:#fff;border-bottom:1px solid var(--border);
  padding:10px 14px;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 1px 4px rgba(0,0,0,.05);
}
.top-title{
  font-family:Cairo;font-weight:900;font-size:1.05rem;color:var(--navy);
  display:flex;align-items:center;gap:8px;
}
.top-title a{color:inherit;text-decoration:none;}
.top-title-brand{color:var(--navy);}
.top-title-divider{color:var(--text-soft);font-weight:400;}
.btn-back{
  background:none;border:1.5px solid var(--border);border-radius:50%;
  width:34px;height:34px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--navy);transition:all .2s;
}
.btn-back:hover{background:var(--cream);border-color:var(--navy);transform:translateX(2px);}
.btn-back svg{width:18px;height:18px;fill:currentColor;}

/* ═══════════════════════════════════════════
   الشاشات
   ═══════════════════════════════════════════ */
.screen{
  display:none;width:100%;max-width:560px;margin:0 auto;
  padding:66px 14px 30px;min-height:100vh;
}
.screen.active{display:block;animation:screenFadeIn .35s ease;}
@keyframes screenFadeIn{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}

/* ═══════════════════════════════════════════
   شاشة البداية: Hero Section (احترافي)
   ═══════════════════════════════════════════ */
.hero-section{
  background:
    radial-gradient(ellipse at 20% 20%, rgba(201,162,39,.2) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 85%, rgba(45,110,84,.3) 0%, transparent 50%),
    linear-gradient(135deg,#0a2820 0%,#0f3028 35%,#162e23 70%,#1a4d3a 100%);
  border-radius:24px;overflow:hidden;position:relative;
  padding:0;margin-bottom:22px;
  box-shadow:
    0 4px 12px rgba(15,48,40,.12),
    0 18px 36px rgba(15,48,40,.22),
    inset 0 1px 0 rgba(201,162,39,.2);
  border:1.5px solid rgba(201,162,39,.35);
}
.hero-section::before{
  content:"";position:absolute;top:-30%;right:-15%;
  width:60%;height:80%;opacity:.12;
  background:radial-gradient(circle, var(--gold-soft) 0%, transparent 65%);
  filter:blur(50px);pointer-events:none;
}
.hero-section::after{
  content:"";position:absolute;inset:0;pointer-events:none;
  background-image:
    radial-gradient(circle at 30% 70%, rgba(255,255,255,.02) 0%, transparent 20%),
    radial-gradient(circle at 70% 30%, rgba(201,162,39,.04) 0%, transparent 20%);
}

.hero-inner{
  position:relative;z-index:2;
  display:grid;grid-template-columns:1.1fr 1fr;
  gap:8px;align-items:center;
  padding:26px 20px 22px;
}

/* ═══ رسمة البطاقات المتراكمة (محسنة) ═══ */
.hero-illustration{
  position:relative;
  height:160px;
  display:flex;align-items:center;justify-content:center;
}
.hero-card-stack{
  position:relative;width:110px;height:140px;
  animation:cardsFloat 5s ease-in-out infinite;
}
@keyframes cardsFloat{
  0%,100%{transform:translateY(0) rotate(0deg);}
  50%{transform:translateY(-8px) rotate(1deg);}
}
.hero-mini-card{
  position:absolute;inset:0;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:
    0 4px 10px rgba(0,0,0,.25),
    0 8px 24px rgba(0,0,0,.18),
    inset 0 1px 0 rgba(255,255,255,.6);
  transition:all .3s ease;
}
.hero-mini-card::before{
  content:"";position:absolute;inset:6px;
  border-radius:7px;border:1px dashed rgba(201,162,39,.35);
  pointer-events:none;
}
.hero-mini-card.c1{
  background:linear-gradient(135deg,#fdfaf0 0%,#f5efe0 100%);
  border:1.5px solid rgba(201,162,39,.6);
  transform:rotate(-14deg) translateX(-18px) translateY(4px);
  z-index:1;opacity:.92;
}
.hero-mini-card.c2{
  background:linear-gradient(135deg,var(--paper) 0%,#fdfaf0 100%);
  border:1.5px solid rgba(201,162,39,.75);
  transform:rotate(-4deg) translateX(-6px) translateY(2px);
  z-index:2;opacity:.97;
}
.hero-mini-card.c3{
  background:linear-gradient(135deg,#ffffff 0%,#fdfaf0 100%);
  border:2px solid var(--gold);
  transform:rotate(8deg) translateX(10px);
  z-index:3;
  box-shadow:
    0 6px 14px rgba(0,0,0,.3),
    0 12px 32px rgba(201,162,39,.2),
    inset 0 1px 0 rgba(255,255,255,.8);
}
.hero-mini-card svg{width:34px;height:34px;fill:var(--gold);filter:drop-shadow(0 2px 4px rgba(201,162,39,.3));}
.hero-mini-card.c1 svg{opacity:.5;width:28px;height:28px;}
.hero-mini-card.c2 svg{opacity:.7;width:30px;height:30px;}

/* بريق صغير على البطاقة الأمامية */
.hero-card-sparkle{
  position:absolute;top:-6px;right:-4px;z-index:4;
  width:18px;height:18px;
  animation:sparkle 2s ease-in-out infinite;
}
.hero-card-sparkle svg{width:100%;height:100%;fill:var(--gold-soft);}
@keyframes sparkle{
  0%,100%{transform:scale(1) rotate(0);opacity:.8;}
  50%{transform:scale(1.2) rotate(90deg);opacity:1;}
}

/* ═══ محتوى النص (محسن) ═══ */
.hero-content-new{
  position:relative;z-index:2;color:#fff;text-align:right;
}
.hero-badge-new{
  display:inline-flex;align-items:center;gap:7px;
  background:linear-gradient(135deg,rgba(201,162,39,.22),rgba(201,162,39,.12));
  border:1px solid var(--gold);color:var(--gold-soft);
  padding:5px 13px;border-radius:999px;
  font-family:Cairo;font-weight:900;font-size:.66rem;letter-spacing:1.2px;
  margin-bottom:12px;backdrop-filter:blur(8px);
  box-shadow:0 2px 8px rgba(201,162,39,.15);
}
.hero-badge-new svg{width:11px;height:11px;fill:var(--gold-soft);}

.hero-title-new{
  font-family:Cairo;font-weight:900;font-size:1.75rem;
  line-height:1.15;letter-spacing:-.4px;
  color:#fff;
  text-shadow:0 2px 12px rgba(0,0,0,.3);
}
.hero-title-word-1{color:rgba(255,255,255,.95);}
.hero-title-word-2{color:rgba(255,255,255,.85);}
.hero-title-accent-new{
  color:var(--gold-soft);
  position:relative;display:inline-block;
  background:linear-gradient(135deg,var(--gold-soft) 0%,var(--gold) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 2px 8px rgba(201,162,39,.3));
}
.hero-title-accent-new::after{
  content:"";position:absolute;bottom:-4px;right:0;
  width:100%;height:3px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  border-radius:2px;
}

/* ═══ شريط الإحصائيات (احترافي) ═══ */
.hero-stats-bar{
  background:linear-gradient(180deg,rgba(0,0,0,.35) 0%,rgba(0,0,0,.45) 100%);
  backdrop-filter:blur(12px);
  display:grid;grid-template-columns:repeat(3,1fr);
  position:relative;z-index:2;
  border-top:1px solid rgba(201,162,39,.25);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
}
.hero-stat-new{
  padding:14px 6px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  position:relative;
  transition:background .2s;
}
.hero-stat-new:hover{background:rgba(201,162,39,.05);}
.hero-stat-new::after{
  content:"";position:absolute;left:0;top:25%;
  width:1px;height:50%;
  background:linear-gradient(180deg,transparent,rgba(201,162,39,.35),transparent);
}
.hero-stat-new:last-child::after{display:none;}

.hero-stat-new-icon{
  width:18px;height:18px;fill:var(--gold-soft);opacity:.85;margin-bottom:2px;
}
.hero-stat-new-num{
  font-family:Cairo;font-weight:900;font-size:1.4rem;
  color:var(--gold-soft);line-height:1;
  text-shadow:0 2px 8px rgba(201,162,39,.2);
}
.hero-stat-new-lbl{
  font-size:.66rem;color:rgba(255,255,255,.7);
  font-weight:700;letter-spacing:.3px;
}

@media(max-width:400px){
  .hero-inner{grid-template-columns:1fr;padding:24px 18px 18px;text-align:center;}
  .hero-content-new{text-align:center;}
  .hero-illustration{order:-1;height:120px;margin-bottom:4px;}
  .hero-title-new{font-size:1.55rem;}
  .hero-card-stack{width:95px;height:120px;}
}

/* ═══════════════════════════════════════════
   عنوان قسم
   ═══════════════════════════════════════════ */
.section-label{
  display:flex;align-items:center;gap:10px;
  font-family:Cairo;font-weight:900;font-size:1.05rem;color:var(--navy);
  margin:26px 0 14px;padding:0 4px;
}
.section-label::before{
  content:"";width:3.5px;height:20px;
  background:linear-gradient(to bottom,var(--gold),var(--gold-dark));
  border-radius:2px;flex-shrink:0;
}
.section-label-count{
  font-size:.75rem;font-weight:700;color:var(--text-soft);
  background:var(--border);padding:2px 10px;border-radius:999px;
  margin-right:auto;
}

/* ═══════════════════════════════════════════
   بطاقات الحزم (Decks)
   ═══════════════════════════════════════════ */
.decks-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:12px;
}
.deck-card{
  position:relative;border-radius:18px;overflow:hidden;
  cursor:pointer;transition:all .3s cubic-bezier(.34,1.2,.64,1);
  min-height:170px;padding:16px 14px;
  border:2px solid transparent;
  box-shadow:
    0 2px 8px rgba(15,48,40,.06),
    0 8px 20px rgba(15,48,40,.08);
}
.deck-card:hover{
  transform:translateY(-4px);
  box-shadow:
    0 4px 12px rgba(15,48,40,.1),
    0 16px 32px rgba(15,48,40,.18);
}
.deck-card:active{transform:translateY(-2px);}

.deck-card-content{
  position:relative;z-index:2;height:100%;
  display:flex;flex-direction:column;
}
.deck-card-header{
  display:flex;align-items:flex-start;justify-content:space-between;gap:8px;
  margin-bottom:10px;
}
.deck-icon{
  width:42px;height:42px;border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  box-shadow:0 4px 10px rgba(0,0,0,.12);
}
.deck-icon svg{width:22px;height:22px;}
.deck-progress-ring{
  width:38px;height:38px;flex-shrink:0;position:relative;
}
.deck-progress-ring svg{width:100%;height:100%;transform:rotate(-90deg);}
.deck-progress-pct{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:Cairo;font-weight:900;font-size:.7rem;color:var(--navy);
}

.deck-title{
  font-family:Cairo;font-weight:900;font-size:1.02rem;color:var(--navy);
  line-height:1.2;margin-bottom:5px;
}
.deck-desc{
  font-size:.72rem;color:var(--text-soft);line-height:1.45;font-weight:600;
  flex:1;
}
.deck-meta{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);
}
.deck-count{
  display:flex;align-items:center;gap:4px;
  font-size:.7rem;font-weight:800;color:var(--navy);
}
.deck-count svg{width:13px;height:13px;fill:currentColor;}
.deck-level{
  font-size:.6rem;font-weight:900;letter-spacing:.5px;
  padding:2px 7px;border-radius:999px;text-transform:uppercase;
}
.deck-level.basic{background:#e8f5ee;color:var(--success);}
.deck-level.intermediate{background:#fff3c4;color:#7a5c10;}
.deck-level.advanced{background:#fce8ee;color:var(--maroon);}
.deck-level.legend{background:linear-gradient(135deg,#faf2d6,#f3e8c4);color:var(--gold-dark);border:1px solid var(--gold);}

/* ألوان الحزم */
.deck-history{background:linear-gradient(135deg,#fce8ee 0%,#fff 100%);}
.deck-history .deck-icon{background:linear-gradient(135deg,#a1234d,var(--maroon));color:#fff;}
.deck-history:hover{border-color:var(--maroon);}

.deck-religion{background:linear-gradient(135deg,#e8f5ee 0%,#fff 100%);}
.deck-religion .deck-icon{background:linear-gradient(135deg,var(--navy-light),var(--navy));color:#fff;}
.deck-religion:hover{border-color:var(--navy);}

.deck-qatar{background:linear-gradient(135deg,#fdeee4 0%,#fff 100%);}
.deck-qatar .deck-icon{background:linear-gradient(135deg,#c97640,#a85e29);color:#fff;}
.deck-qatar:hover{border-color:#a85e29;}

.deck-rulers{background:linear-gradient(135deg,#e5eef6 0%,#fff 100%);}
.deck-rulers .deck-icon{background:linear-gradient(135deg,#3a6ba3,#2c5282);color:#fff;}
.deck-rulers:hover{border-color:#2c5282;}

.deck-science{background:linear-gradient(135deg,#e8f2ec 0%,#fff 100%);}
.deck-science .deck-icon{background:linear-gradient(135deg,var(--navy-light),var(--navy));color:#fff;}
.deck-science:hover{border-color:var(--navy-light);}

.deck-legends{background:linear-gradient(135deg,#faf2d6 0%,#fff 100%);}
.deck-legends .deck-icon{background:linear-gradient(135deg,var(--gold-soft),var(--gold));color:var(--navy-darker);}
.deck-legends:hover{border-color:var(--gold);}

/* ═══════════════════════════════════════════
   شاشة الدراسة (البطاقات)
   ═══════════════════════════════════════════ */
.study-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;gap:12px;
}
.study-deck-name{
  font-family:Cairo;font-weight:900;font-size:1rem;color:var(--navy);
  display:flex;align-items:center;gap:8px;
}
.study-deck-name svg{width:18px;height:18px;fill:var(--gold);}
.study-progress-text{
  font-family:Cairo;font-weight:900;font-size:.82rem;color:var(--text-soft);
  background:#fff;padding:6px 14px;border-radius:999px;
  border:1.5px solid var(--border);
}

.progress-track{
  height:6px;background:var(--border);border-radius:999px;
  overflow:hidden;margin-bottom:20px;
}
.progress-fill{
  height:100%;background:linear-gradient(90deg,var(--navy-light),var(--navy),var(--gold));
  border-radius:999px;transition:width .5s cubic-bezier(.34,1.2,.64,1);
  box-shadow:0 0 10px rgba(201,162,39,.4);
}

/* البطاقة (Flip Card) */
.flashcard-container{
  perspective:1500px;
  margin-bottom:18px;
}
.flashcard{
  position:relative;width:100%;aspect-ratio:3/4;max-height:460px;
  transition:transform .7s cubic-bezier(.4,0,.2,1);
  transform-style:preserve-3d;
  cursor:pointer;
}
.flashcard.flipped{transform:rotateY(180deg);}
.flashcard-face{
  position:absolute;inset:0;
  border-radius:22px;padding:26px 22px;
  display:flex;flex-direction:column;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  overflow:hidden;
  box-shadow:
    0 4px 12px rgba(15,48,40,.08),
    0 14px 32px rgba(15,48,40,.15),
    0 28px 56px rgba(15,48,40,.1);
}

.flashcard-front{
  background:
    radial-gradient(circle at 20% 20%,rgba(201,162,39,.08) 0%,transparent 50%),
    linear-gradient(135deg,#fff 0%,#fdfaf0 100%);
  border:2px solid var(--gold);
}
.flashcard-back{
  background:
    radial-gradient(circle at 80% 80%,rgba(201,162,39,.22) 0%,transparent 55%),
    linear-gradient(135deg,var(--navy-darker) 0%,var(--navy) 50%,var(--navy-light) 100%);
  border:2px solid var(--gold);
  transform:rotateY(180deg);
  color:#fff;
}

/* زخرفة البطاقة */
.card-corner{
  position:absolute;width:36px;height:36px;
  border:2px solid;pointer-events:none;
}
.card-corner.tl{top:12px;right:12px;border-left:none;border-bottom:none;border-top-right-radius:14px;}
.card-corner.br{bottom:12px;left:12px;border-right:none;border-top:none;border-bottom-left-radius:14px;}
.flashcard-front .card-corner{border-color:var(--gold);opacity:.6;}
.flashcard-back .card-corner{border-color:var(--gold-soft);opacity:.7;}

.card-label{
  display:inline-flex;align-items:center;gap:5px;align-self:flex-start;
  font-family:Cairo;font-weight:900;font-size:.65rem;letter-spacing:1.5px;
  padding:4px 12px;border-radius:999px;
  margin-bottom:14px;
}
.flashcard-front .card-label{
  background:var(--paper);color:var(--gold-dark);border:1px solid var(--gold);
}
.flashcard-back .card-label{
  background:rgba(201,162,39,.22);color:var(--gold-soft);border:1px solid var(--gold);
}

.card-content{
  flex:1;display:flex;align-items:center;justify-content:center;
  text-align:center;padding:10px 6px;
}
.card-question{
  font-family:Cairo;font-weight:800;font-size:1.35rem;line-height:1.5;
  color:var(--navy);
}
.card-answer{
  font-family:Cairo;font-weight:900;font-size:1.6rem;line-height:1.3;
  color:var(--gold-soft);margin-bottom:14px;
}
.card-explanation{
  font-family:Tajawal;font-weight:600;font-size:.86rem;line-height:1.75;
  color:rgba(255,255,255,.9);max-width:100%;
  background:rgba(0,0,0,.25);padding:12px 14px;border-radius:12px;
  border:1px solid rgba(201,162,39,.3);
}

.card-footer{
  display:flex;align-items:center;justify-content:space-between;
  font-size:.7rem;font-weight:700;
  margin-top:auto;padding-top:12px;
  border-top:1px dashed;
}
.flashcard-front .card-footer{border-color:var(--border);color:var(--text-soft);}
.flashcard-back .card-footer{border-color:rgba(201,162,39,.25);color:rgba(255,255,255,.6);}
.card-footer-hint{display:flex;align-items:center;gap:5px;}
.card-footer-hint svg{width:14px;height:14px;fill:currentColor;opacity:.7;}

/* أزرار المعرفة */
.knowledge-actions{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;
  margin-bottom:16px;
}
.know-btn{
  padding:13px 10px;border-radius:14px;cursor:pointer;
  font-family:Cairo;font-weight:900;font-size:.84rem;
  border:2px solid;transition:all .2s;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  background:#fff;
}
.know-btn svg{width:22px;height:22px;}
.know-btn:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.1);}
.know-btn:active{transform:translateY(0);}

.know-btn.hard{border-color:var(--danger);color:var(--danger);}
.know-btn.hard:hover{background:var(--danger);color:#fff;}
.know-btn.hard svg{fill:var(--danger);transition:fill .2s;}
.know-btn.hard:hover svg{fill:#fff;}

.know-btn.medium{border-color:#d4820c;color:#d4820c;}
.know-btn.medium:hover{background:#d4820c;color:#fff;}
.know-btn.medium svg{fill:#d4820c;transition:fill .2s;}
.know-btn.medium:hover svg{fill:#fff;}

.know-btn.easy{border-color:var(--success);color:var(--success);}
.know-btn.easy:hover{background:var(--success);color:#fff;}
.know-btn.easy svg{fill:var(--success);transition:fill .2s;}
.know-btn.easy:hover svg{fill:#fff;}

.flip-hint{
  text-align:center;padding:10px;
  background:#fff;border:1.5px dashed var(--gold);border-radius:12px;
  font-size:.82rem;font-weight:700;color:var(--navy);
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.flip-hint svg{width:16px;height:16px;fill:var(--gold);}

.nav-row{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  margin-top:16px;
}
.nav-btn{
  flex:1;padding:10px;border-radius:10px;cursor:pointer;
  font-family:Cairo;font-weight:800;font-size:.8rem;color:var(--navy);
  background:#fff;border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:all .2s;
}
.nav-btn:hover:not(:disabled){background:var(--cream);border-color:var(--navy);}
.nav-btn:disabled{opacity:.4;cursor:not-allowed;}
.nav-btn svg{width:14px;height:14px;fill:currentColor;}

/* ═══════════════════════════════════════════
   شاشة النتيجة
   ═══════════════════════════════════════════ */
.result-hero{
  background:linear-gradient(135deg,var(--navy-darker) 0%,var(--navy) 50%,var(--navy-light) 100%);
  color:#fff;border:2px solid var(--gold);border-radius:24px;
  padding:30px 22px;text-align:center;
  box-shadow:0 14px 40px rgba(15,48,40,.25);
  position:relative;overflow:hidden;margin-bottom:18px;
}
.result-hero::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(circle at 50% 0%,rgba(201,162,39,.2),transparent 60%);
  pointer-events:none;
}
.result-emoji{
  width:70px;height:70px;margin:0 auto 14px;
  border-radius:50%;background:rgba(201,162,39,.2);
  border:2.5px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:2;
}
.result-emoji svg{width:36px;height:36px;fill:var(--gold-soft);}
.result-title{font-family:Cairo;font-weight:900;font-size:1.5rem;margin-bottom:5px;position:relative;z-index:2;}
.result-sub{font-size:.88rem;opacity:.85;margin-bottom:18px;position:relative;z-index:2;}

.result-stats{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  position:relative;z-index:2;
}
.result-stat-card{
  background:rgba(255,255,255,.08);border:1px solid rgba(201,162,39,.25);
  border-radius:12px;padding:10px 8px;
}
.result-stat-num{font-family:Cairo;font-weight:900;font-size:1.4rem;color:var(--gold-soft);}
.result-stat-lbl{font-size:.68rem;color:rgba(255,255,255,.7);font-weight:700;margin-top:3px;}

.result-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.result-btn{
  padding:13px;border-radius:12px;cursor:pointer;border:none;
  font-family:Cairo;font-weight:900;font-size:.88rem;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:all .2s;
}
.result-btn svg{width:16px;height:16px;fill:currentColor;}
.result-btn-primary{
  background:linear-gradient(135deg,var(--navy-light),var(--navy));color:#fff;
  box-shadow:0 4px 14px rgba(26,77,58,.3);
}
.result-btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,77,58,.4);}
.result-btn-gold{
  background:linear-gradient(135deg,var(--gold-soft),var(--gold));color:var(--navy-darker);
  box-shadow:0 4px 14px rgba(201,162,39,.35);
}
.result-btn-gold:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(201,162,39,.5);}
.result-btn-outline{
  background:#fff;color:var(--navy);border:2px solid var(--navy);
}
.result-btn-outline:hover{background:var(--navy);color:#fff;}

/* توست */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);
  background:var(--navy);color:#fff;border-radius:10px;padding:10px 22px;
  font-weight:700;font-size:.9rem;z-index:9999;transition:transform .3s;
  pointer-events:none;max-width:90vw;text-align:center;
}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.success{background:var(--success);}
#toast.error{background:var(--danger);}
#toast.info{background:#1a5276;}

/* شاشة التحميل */
.loading-splash{
  position:fixed;inset:0;z-index:10000;
  background:var(--cream);
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;
}
.loading-splash.hide{display:none;}
.loading-spinner{
  width:48px;height:48px;border:3px solid var(--border);
  border-top-color:var(--gold);border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* استجابة الشاشة الصغيرة */
@media(max-width:400px){
  .hero-title{font-size:1.85rem;}
  .hero-sub{font-size:.85rem;}
  .decks-grid{grid-template-columns:1fr;}
  .card-question{font-size:1.15rem;}
  .card-answer{font-size:1.4rem;}

}

</style>

// ═══════════════════════════════════════════════════════════════════
// إدارة الشاشات
// ═══════════════════════════════════════════════════════════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function handleBackButton(){
  const active = document.querySelector('.screen.active');
  if(!active) return;
  if(active.id === 'screen-decks'){
    window.location.href = 'index.html';
  } else if(active.id === 'screen-study'){
    if(confirm('هل تريد الخروج؟ سيتم فقدان التقدم في هذه الجلسة.')){
      showScreen('screen-decks');
    }
  } else if(active.id === 'screen-result'){
    showScreen('screen-decks');
  }
}

// ═══════════════════════════════════════════════════════════════════
// Toast
// ═══════════════════════════════════════════════════════════════════
let toastTimer;
function toast(msg, type='info'){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 3000);
}

// ═══════════════════════════════════════════════════════════════════
// التخزين المحلي (تتبع التقدم)
// ═══════════════════════════════════════════════════════════════════
function loadProgress(){
  try{
    return JSON.parse(localStorage.getItem('hh_flashcards_progress') || '{}');
  }catch(e){ return {}; }
}
function saveProgress(data){
  try{
    localStorage.setItem('hh_flashcards_progress', JSON.stringify(data));
  }catch(e){}
}
function getDeckProgress(deckId){
  const all = loadProgress();
  return all[deckId] || {completed:0, total:0, mastered:0};
}
function updateDeckProgress(deckId, stats){
  const all = loadProgress();
  all[deckId] = stats;
  saveProgress(all);
}

function renderDecks(){
  const grid = document.getElementById('decks-grid');
  if(!grid) return;

  const progress = loadProgress();
  let totalCards = 0, masteredTotal = 0;

  const html = Object.entries(DECKS).map(([id, deck])=>{
    const count = deck.cards.length;
    totalCards += count;

    const deckProgress = progress[id] || {completed:0, mastered:0};
    const masteredHere = deckProgress.mastered || 0;
    masteredTotal += masteredHere;
    const pct = count > 0 ? Math.round((masteredHere / count) * 100) : 0;

    // حساب دائرة التقدم
    const circumference = 2 * Math.PI * 15;
    const offset = circumference - (pct / 100) * circumference;

    const levelLabels = {
      basic:'أساسي', intermediate:'متوسط', advanced:'متقدم', legend:'أسطوري'
    };

    return `
      <div class="deck-card ${deck.theme}" onclick="startDeck('${id}')">
        <div class="deck-card-content">
          <div class="deck-card-header">
            <div class="deck-icon">${deck.icon}</div>
            <div class="deck-progress-ring">
              <svg viewBox="0 0 36 36">
                <circle cx="18" cy="18" r="15" fill="none" stroke="#e8f2ec" stroke-width="3"/>
                <circle cx="18" cy="18" r="15" fill="none" stroke="#c9a227" stroke-width="3"
                  stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" stroke-linecap="round"/>
              </svg>
              <div class="deck-progress-pct">${pct}%</div>
            </div>
          </div>
          <div class="deck-title">${deck.title}</div>
          <div class="deck-desc">${deck.desc}</div>
          <div class="deck-meta">
            <div class="deck-count">
              <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
              <span>${count} بطاقة</span>
            </div>
            <span class="deck-level ${deck.level}">${levelLabels[deck.level]}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');

  grid.innerHTML = html;

  // تحديث الإحصائيات في Hero
  document.getElementById('stat-total-cards').textContent = totalCards;
  document.getElementById('stat-total-decks').textContent = Object.keys(DECKS).length;
  document.getElementById('stat-mastered').textContent = masteredTotal;
  document.getElementById('decks-count').textContent = Object.keys(DECKS).length + ' حزم';
}

// ═══════════════════════════════════════════════════════════════════
// بدء حزمة
// ═══════════════════════════════════════════════════════════════════
function startDeck(deckId){
  const deck = DECKS[deckId];
  if(!deck) return;

  State.currentDeck = deckId;
  State.cards = [...deck.cards];
  State.currentIdx = 0;
  State.flipped = false;
  State.ratings = {};
  State.hardIndices = [];
  State.isReviewMode = false;

  document.getElementById('study-deck-name').textContent = deck.title;
  showScreen('screen-study');
  renderCard();
}

// ═══════════════════════════════════════════════════════════════════
// عرض البطاقة الحالية
// ═══════════════════════════════════════════════════════════════════
function renderCard(){
  const total = State.cards.length;
  const idx = State.currentIdx;
  const card = State.cards[idx];
  if(!card) return;

  // إعادة تعيين القلب
  State.flipped = false;
  document.getElementById('flashcard').classList.remove('flipped');
  document.getElementById('knowledge-actions').style.display = 'none';
  document.getElementById('flip-hint').style.display = 'flex';

  // محتوى البطاقة
  document.getElementById('card-question').textContent = card.q;
  document.getElementById('card-answer').textContent = card.a;
  document.getElementById('card-index-front').textContent = (idx+1) + ' من ' + total;

  const explEl = document.getElementById('card-explanation');
  if(card.e && card.e.trim()){
    explEl.textContent = card.e;
    explEl.style.display = 'block';
  } else {
    explEl.style.display = 'none';
  }

  // شريط التقدم
  const progressPct = ((idx+1) / total) * 100;
  document.getElementById('progress-fill').style.width = progressPct + '%';
  document.getElementById('study-progress-text').textContent = (idx+1) + ' / ' + total;

  // أزرار التنقل
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').disabled = false;
}

// ═══════════════════════════════════════════════════════════════════
// قلب البطاقة
// ═══════════════════════════════════════════════════════════════════
function flipCard(){
  State.flipped = !State.flipped;
  const card = document.getElementById('flashcard');
  if(State.flipped){
    card.classList.add('flipped');
    setTimeout(()=>{
      document.getElementById('knowledge-actions').style.display = 'grid';
      document.getElementById('flip-hint').style.display = 'none';
    }, 350);
  } else {
    card.classList.remove('flipped');
    document.getElementById('knowledge-actions').style.display = 'none';
    document.getElementById('flip-hint').style.display = 'flex';
  }
}

// ═══════════════════════════════════════════════════════════════════
// تقييم المعرفة
// ═══════════════════════════════════════════════════════════════════
function rateKnowledge(level){
  const idx = State.currentIdx;
  State.ratings[idx] = level;

  // حفظ الصعبة لعرضها في المراجعة
  if(level === 'hard' && !State.hardIndices.includes(idx)){
    State.hardIndices.push(idx);
  } else if(level !== 'hard'){
    // إزالة من القائمة الصعبة إذا كانت سهلة الآن
    State.hardIndices = State.hardIndices.filter(i=>i!==idx);
  }

  // إظهار feedback قصير
  const msgs = {
    hard: 'سنعيدها لك لاحقاً',
    medium: 'راجعها مرة ثانية',
    easy: 'أتقنت هذه البطاقة'
  };
  toast(msgs[level], level === 'easy' ? 'success' : (level === 'hard' ? 'error' : 'info'));

  // الانتقال التلقائي للتالية بعد نصف ثانية
  setTimeout(()=>{
    if(State.currentIdx < State.cards.length - 1){
      nextCard();
    } else {
      finishDeck();
    }
  }, 450);
}

function nextCard(){
  if(State.currentIdx < State.cards.length - 1){
    State.currentIdx++;
    renderCard();
  } else {
    finishDeck();
  }
}

function prevCard(){
  if(State.currentIdx > 0){
    State.currentIdx--;
    renderCard();
  }
}

// ═══════════════════════════════════════════════════════════════════
// إنهاء الحزمة وحفظ التقدم
// ═══════════════════════════════════════════════════════════════════
function finishDeck(){
  const counts = {easy:0, medium:0, hard:0};
  Object.values(State.ratings).forEach(r=>{
    if(counts.hasOwnProperty(r)) counts[r]++;
  });

  // حفظ التقدم (بدون وضع مراجعة فقط)
  if(!State.isReviewMode){
    const masteredCount = counts.easy;
    updateDeckProgress(State.currentDeck, {
      completed: State.cards.length,
      total: State.cards.length,
      mastered: masteredCount,
      lastStudied: Date.now()
    });
  }

  document.getElementById('res-easy').textContent = counts.easy;
  document.getElementById('res-medium').textContent = counts.medium;
  document.getElementById('res-hard').textContent = counts.hard;

  // الرسالة بناءً على الأداء
  const total = counts.easy + counts.medium + counts.hard;
  const easyPct = total > 0 ? (counts.easy / total) * 100 : 0;

  let title, sub;
  if(easyPct >= 80){
    title = 'أداء استثنائي!';
    sub = 'أتقنت معظم البطاقات — أنت جاهز للاختبار';
  } else if(easyPct >= 50){
    title = 'أداء جيد';
    sub = 'راجع البطاقات الصعبة لتصل للإتقان الكامل';
  } else {
    title = 'المراجعة تصنع الفرق';
    sub = 'ركّز على البطاقات الصعبة وأعد المحاولة';
  }

  document.getElementById('result-title').textContent = title;
  document.getElementById('result-sub').textContent = sub;

  // تفعيل/تعطيل زر "راجع الصعبة"
  const hardBtn = document.getElementById('btn-review-hard');
  if(counts.hard === 0){
    hardBtn.disabled = true;
    hardBtn.style.opacity = '0.4';
    hardBtn.style.cursor = 'not-allowed';
  } else {
    hardBtn.disabled = false;
    hardBtn.style.opacity = '1';
    hardBtn.style.cursor = 'pointer';
  }

  showScreen('screen-result');
}

// ═══════════════════════════════════════════════════════════════════
// المراجعة الذكية — الصعبة فقط
// ═══════════════════════════════════════════════════════════════════
function reviewHardOnly(){
  if(State.hardIndices.length === 0){
    toast('لا توجد بطاقات صعبة للمراجعة', 'info');
    return;
  }

  const deck = DECKS[State.currentDeck];
  const hardCards = State.hardIndices.map(i=>deck.cards[i]);

  State.cards = hardCards;
  State.currentIdx = 0;
  State.flipped = false;
  State.ratings = {};
  State.hardIndices = [];
  State.isReviewMode = true;

  toast('مراجعة ' + hardCards.length + ' بطاقة صعبة', 'info');
  showScreen('screen-study');
  renderCard();
}

function restartDeck(){
  startDeck(State.currentDeck);
}

// ═══════════════════════════════════════════════════════════════════
// اختصارات لوحة المفاتيح
// ═══════════════════════════════════════════════════════════════════
document.addEventListener('keydown', (e)=>{
  const active = document.querySelector('.screen.active');
  if(!active || active.id !== 'screen-study') return;

  if(e.key === ' ' || e.key === 'Enter'){
    e.preventDefault();
    flipCard();
  } else if(e.key === 'ArrowLeft'){
    nextCard();
  } else if(e.key === 'ArrowRight'){
    prevCard();
  } else if(State.flipped){
    if(e.key === '1') rateKnowledge('hard');
    else if(e.key === '2') rateKnowledge('medium');
    else if(e.key === '3') rateKnowledge('easy');
  }
});

// ═══════════════════════════════════════════════════════════════════
// التهيئة
// ═══════════════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', ()=>{
  renderDecks();
  // إخفاء شاشة التحميل
  setTimeout(()=>{
    document.getElementById('loading-splash').classList.add('hide');
  }, 400);
});

// دعم الوضع الليلي لو كان محفوظاً في المنصة الرئيسية
if(localStorage.getItem('hh_dark_mode') === '1'){
  document.body.classList.add('dark-mode');
}

</script>
