<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5C3A1E"/>
      <stop offset="50%" stop-color="#3d2614"/>
      <stop offset="100%" stop-color="#2a1a0c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5d76e"/>
      <stop offset="50%" stop-color="#c9a227"/>
      <stop offset="100%" stop-color="#7a6418"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#f5d76e" stop-opacity="0.28"/>
      <stop offset="70%" stop-color="#f5d76e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <ellipse cx="256" cy="256" rx="280" ry="280" fill="url(#glow)"/>
  <!-- نجمة فوق الميم -->
  <g transform="translate(256, 95)">
    <path d="M 0,-32 L 8,-10 L 32,-10 L 13,5 L 21,27 L 0,13 L -21,27 L -13,5 L -32,-10 L -8,-10 Z"
          fill="url(#gold)" stroke="#f5d76e" stroke-width="2"/>
  </g>
  <!-- حرف الميم -->
  <text x="256" y="375"
        font-family="'Noto Sans Arabic', 'Cairo', sans-serif"
        font-size="380" font-weight="900" text-anchor="middle"
        fill="url(#gold)">م</text>
  <!-- خط ذهبي زخرفي -->
  <line x1="116" y1="418" x2="396" y2="418" stroke="url(#gold)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="100" cy="418" r="5" fill="#c9a227"/>
  <circle cx="412" cy="418" r="5" fill="#c9a227"/>
</svg>
